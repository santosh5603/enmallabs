<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- White rounded background -->
  <rect width="200" height="200" rx="30" fill="white"/>

  <!-- Dashed arc connectors between each pair of elements -->
  <g fill="none" stroke="black" stroke-width="6.5" stroke-linecap="round" stroke-dasharray="9 8">
    <path d="M116,40 A62,62 0 0,1 144,56"/>
    <path d="M160,84 A62,62 0 0,1 160,116"/>
    <path d="M144,144 A62,62 0 0,1 116,160"/>
    <path d="M84,160 A62,62 0 0,1 56,144"/>
    <path d="M40,116 A62,62 0 0,1 40,84"/>
    <path d="M56,56 A62,62 0 0,1 84,40"/>
  </g>

  <!-- Center filled circle -->
  <circle cx="100" cy="100" r="36" fill="black"/>

  <!-- TOP (100,38): pointy-top solid hexagon -->
  <polygon fill="black" points="100,21 114.7,29.5 114.7,46.5 100,55 85.3,46.5 85.3,29.5"/>

  <!-- TOP-RIGHT (154,69): flat-top solid hexagon -->
  <polygon fill="black" points="170,69 162,82.9 146,82.9 138,69 146,55.1 162,55.1"/>

  <!-- BOTTOM-RIGHT (154,131): cracked flat-top hexagon, two pieces -->
  <polygon fill="black" points="138,131 146,117.1 153,117.1 150,127 153,131 150,135 153,144.9 146,144.9"/>
  <polygon fill="black" points="155,117.1 162,117.1 170,131 162,144.9 155,144.9 158,135 155,131 158,127"/>

  <!-- BOTTOM (100,162): isometric 3D cube -->
  <polygon fill="black" points="100,147 114,155.5 114,169.5 100,177 86,169.5 86,155.5"/>
  <line x1="86" y1="155.5" x2="100" y2="164" stroke="white" stroke-width="1.8"/>
  <line x1="114" y1="155.5" x2="100" y2="164" stroke="white" stroke-width="1.8"/>
  <line x1="100" y1="164" x2="100" y2="177" stroke="white" stroke-width="1.8"/>

  <!-- BOTTOM-LEFT (46,131): flat-top solid hexagon -->
  <polygon fill="black" points="62,131 54,144.9 38,144.9 30,131 38,117.1 54,117.1"/>

  <!-- TOP-LEFT (46,69): cracked flat-top hexagon, two pieces -->
  <polygon fill="black" points="30,69 38,55.1 45,55.1 42,65 45,69 42,73 45,82.9 38,82.9"/>
  <polygon fill="black" points="47,55.1 54,55.1 62,69 54,82.9 47,82.9 50,73 47,69 50,65"/>
</svg>
